<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Skebob Robotec — Plane Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; color: #e0e0e0; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
    h1 { margin-bottom: 16px; font-size: 1.2rem; letter-spacing: 2px; color: #00ff88; }
    #feed-container { position: relative; border: 2px solid #00ff88; border-radius: 4px; overflow: hidden; width: 640px; max-width: 100%; background: #111; }
    #feed { width: 100%; display: block; }
    #status { margin-top: 10px; font-size: 0.85rem; color: #888; }
    #status span { color: #00ff88; }
    #error-msg { display: none; color: #ff4444; margin-top: 12px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>SKEBOB ROBOTEC // PLANE TRACKER</h1>

  <div id="feed-container">
    <img id="feed" src="/video" alt="camera feed"
         onerror="showError()" onload="clearError()">
  </div>

  <p id="status">Stream: <span id="stream-state">connecting...</span></p>
  <p id="error-msg">Camera stream lost. <a href="/" style="color:#ffaa00">Reload</a></p>

  <script>
    const img = document.getElementById('feed');
    const state = document.getElementById('stream-state');
    const errMsg = document.getElementById('error-msg');

    function clearError() {
      state.textContent = 'live';
      state.style.color = '#00ff88';
      errMsg.style.display = 'none';
    }

    function showError() {
      state.textContent = 'lost';
      state.style.color = '#ff4444';
      errMsg.style.display = 'block';
      // retry after 3s
      setTimeout(() => { img.src = '/video?' + Date.now(); }, 3000);
    }
  </script>
</body>
</html>
